{% extends "base.html" %}
{% load static %}

{% block title %}SignUp{% endblock %}

{% block page_header %}
<div class="container">
    <div class="row">
        <div class="col">
            <h2 class="text-center mt-3">Sign Up</h2>
            <hr class="w-50 mx-auto mb-4">
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Sign Up</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Log in here</a></p>
</div>
    
{% endblock %}
