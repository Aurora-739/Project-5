{% extends "base.html" %}
{% load static %}

{% block page_header %}
<!-- Carousel container -->
<div class="carousel-container position-relative">

  <!-- Header on top of carousel -->
  <div class="carousel-header position-absolute w-100 text-center">
    <a href="{% url 'home' %}" class="main-logo-link">
      <h1 id="hero-title"><em>Michelle's_Craft_Room</em></h1>
    </a>
  </div>

  <!-- Carousel -->
  <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
    <ol class="carousel-indicators">
      <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
      <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
      <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
    </ol>
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img class="d-block w-100 carousel-img" src="{% static 'images_project_5/hero.JPG' %}" alt="First slide">
      </div>
      <div class="carousel-item">
        <img class="d-block w-100 carousel-img" src="{% static 'images_project_5/blue_feather.JPG' %}" alt="Second slide">
      </div>
      <div class="carousel-item">
        <img class="d-block w-100 carousel-img" src="{% static 'images_project_5/blue_autumn_leaves.JPG' %}" alt="Third slide">
      </div>
    </div>
    <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="sr-only">Previous</span>
    </a>
    <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="sr-only">Next</span>
    </a>
  </div>
</div>
{% endblock %}

{% block content %}
<div class=""></div>
<div class="container py-4">
  <div class="row align-items-center">

    <!-- LEFT: TEXT -->
    <div class="col-12 col-md-6 d-flex flex-column justify-content-center text-center text-md-left mb-4 mb-md-0">
      <h1 class="sub-header">
        The_new_collection_is_in!
      </h1>
      <div class="my-3">
        <h2>
          <a href="{% url 'products:all_products' %}" class="shop-now-button">Shop Now</a>
        </h2>
      </div>
    </div>

    <!-- RIGHT: IMAGE -->
    <div class="col-12 col-md-6 text-center">
      <img class="img-fluid carousel-img" src="{% static 'images_project_5/mordern_green_tree.png' %}"
        alt="Featured product">
    </div>

  </div>
</div>

{% endblock %}

{% block postloadjs %}
{{ block.super }}
<script>
  window.addEventListener('scroll', function () {
    const topnav = document.getElementById('topnav');
    if (topnav) {
      if (window.scrollY > 50) {
        topnav.classList.add('scrolled');
      } else {
        topnav.classList.remove('scrolled');
      }
    }
  });
</script>
{% endblock %}
