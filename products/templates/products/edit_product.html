{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block extra_title %} | Edit Product{% endblock %}

{% block page_header %}
<div class="container">
    <div class="row">
        <div class="col">
            <h2 class="text-center mt-3">Edit Product</h2>
            <hr class="w-50 mx-auto mb-4">
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row">
        <div class="col-12 col-md-8 offset-md-2">
            <h2>Edit Product: {{ product.name }}</h2>
            <hr>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-3">
                    <a href="{% url 'products:product_detail' product.sku %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-black ml-2">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
