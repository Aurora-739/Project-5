{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block extra_title %} | Add Product{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row">
        <div class="col-12 col-md-8 offset-md-2">
            <h2>Add a Product</h2>
            <hr>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-3">
                    <a href="{% url 'products:all_products' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-black ml-2">Add Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
